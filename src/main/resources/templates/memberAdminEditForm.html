<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 수정(관리자)</title>
    <link rel="stylesheet" th:href="@{/css/visitor.css}">
    <style>
        .box { width: 420px; margin: 40px auto; padding: 24px; border: 1px solid #ddd; border-radius: 12px; background: #fff; }
        label { display: block; margin: 12px 0; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 16px; margin-top: 10px; }
        .msg { color: #2563eb; }
        .error { color: #dc2626; }
        .hint { background: #f3f4f6; padding: 10px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>회원 수정</h1>
        <p>아이디:<strong th:text="${member.username}"></strong></p>
        <form method="POST" th:action="@{/admin/members/{id}/edit(id=${member.id})}" th:object="${memberForm}">
            <div class="error" th:if="${#fields.hasGlobalErrors()}"
                 th:each="err : ${#fields.globalErrors()}"
                 th:text="${err}"></div>

            <label>이름
                <input type="text" th:field="*{name}" required>
                <span class="error" th:errors="*{name}"></span>
            </label>

            <label>이메일
                <input type="email" th:field="*{email}" required>
                <span class="error" th:errors="*{email}"></span>
            </label>

            <label>새비밀번호
                <input type="password" th:field="*{password}" placeholder="변경하지 않으려면 비워두세요">
                <span class="error" th:errors="*{password}"></span>
            </label>

            <label>권한
                <select th:field="*{role}">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </label>

            <label>
                <input type="checkbox" th:field="*{enabled}"> 사용가능
            </label>

            <button type="submit">수정</button>
            <a th:href="@{/admin/members}"><button type="button">회원 목록</button></a>
        </form>
    </div>
</body>
</html>
