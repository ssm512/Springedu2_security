<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원추가</title>
    <link rel="stylesheet" href="/css/visitor.css">
    <style>
        .box { width: 420px; margin: 40px auto; padding: 24px; border: 1px solid #ddd; border-radius: 12px; background: #fff; }
        label { display: block; margin: 12px 0; }
        input { width: 100%; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 16px; margin-top: 10px; }
        .error { color: #dc2626; }
    </style>
</head>
<body>
    <div class="box">
        <h1>회원추가</h1>
        <form method="POST" th:action="@{/admin/members}" th:object="${memberForm}">
            <div class="error" th:if="${#fields.hasGlobalErrors()}"
                th:each="err : ${#fields.globalErrors()}"
                th:text="${err}"></div>
            <!--*가 th:object="${memberForm}" 가 찾을때 필요함-->
            <label>아이디
                <input type="text" th:field="*{username}" placeholder="4자 이상 아이디" required>
                <span class="error" th:errors="*{username}"></span>
            </label>
            <label>비밀번호
                <input type="password" th:field="*{password}" placeholder="4자 이상 비밀번호" required>
                <span class="error" th:errors="*{password}"></span>
            </label>
            <label>이름
                <input type="text" th:field="*{name}" placeholder="최대 30자" required>
                <span class="error" th:errors="*{name}"></span>
            </label>
            <label>이메일
                <input type="email" th:field="*{email}" placeholder="최대 120자" required>
                <span class="error" th:errors="*{email}"></span>
            </label>
            <label>권한
                <select th:field="*{role}">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </label>
            <button type="submit">저장</button>
            <a th:href="@{/admin/members}"><button type="button">회원 목록</button></a>
        </form>
    </div>
</body>
</html>
